[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Serverless functions. `submission-created` is auto-invoked by Netlify after
# every verified form submission and mirrors wishlist entries into Supabase.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
