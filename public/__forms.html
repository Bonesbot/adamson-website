<!--
  Static form copy for Netlify form-detection.

  Netlify scans every HTML file in the deploy for <form name="..." netlify>
  elements at post-processing time and registers them. The visible contact form
  at /contact lives inside an Astro template; Netlify's parser had been
  failing to register it (POSTs were falling through to the static 404
  handler). This file exists ONLY so Netlify can reliably see the form.

  It is not linked from anywhere on the site. Do not delete.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Netlify form detection</title>
  <meta name="robots" content="noindex,nofollow" />
</head>
<body>
  <form name="contact" netlify netlify-honeypot="bot-field" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <select name="interest">
      <option value="buying">Buying a Home</option>
      <option value="selling">Selling a Home</option>
      <option value="market-info">Market Information</option>
      <option value="relocation">Relocating to Sarasota</option>
      <option value="other">Other</option>
    </select>
    <textarea name="message"></textarea>
  </form>
</body>
</html>
